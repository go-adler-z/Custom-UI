<header class="nav-host">
  <nav class="nav">

    <!-- Brand -->
    <a class="nav__brand" routerLink="/">
      <div class="nav__logo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </div>
      <span class="nav__brand-name">Zuper<span class="nav__brand-accent">Pro</span></span>
    </a>

    <!-- Center pill links -->
    <div class="nav__links">
      <a class="nav__link" routerLink="/" routerLinkActive="nav__link--active" [routerLinkActiveOptions]="{exact:true}">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </a>
      <a class="nav__link" routerLink="/features" routerLinkActive="nav__link--active">
        <mat-icon>extension</mat-icon>
        <span>Features</span>
      </a>
      <a class="nav__link" routerLink="/builder" routerLinkActive="nav__link--active">
        <mat-icon>terminal</mat-icon>
        <span>Builder</span>
      </a>
    </div>

    <!-- Right -->
    <div class="nav__right">
      @if (isAuthed) {
        @if (userEmail) {
          <div class="nav__user">
            <div class="nav__user-avatar">{{ userEmail[0].toUpperCase() }}</div>
            <span class="nav__user-email">{{ userEmail }}</span>
          </div>
        }
        <button class="nav__signout" (click)="logout()" title="Sign out">
          <mat-icon>logout</mat-icon>
        </button>
      } @else {
        <a class="nav__signin" routerLink="/login">
          Sign in
          <mat-icon>arrow_forward</mat-icon>
        </a>
      }
    </div>

  </nav>
</header>
