<header class="nav-bar">
  <nav class="nav-inner">

    <!-- Brand -->
    <a class="nav-brand" routerLink="/">
      <div class="nav-brand__logo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </div>
      <span class="nav-brand__name">Zuper<strong>Pro</strong></span>
    </a>

    <!-- Center links -->
    <div class="nav-links">
      <a class="nav-link" routerLink="/" routerLinkActive="nav-link--active" [routerLinkActiveOptions]="{exact:true}">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </a>
      <a class="nav-link" routerLink="/features" routerLinkActive="nav-link--active">
        <mat-icon>extension</mat-icon>
        <span>Features</span>
      </a>
      <a class="nav-link" routerLink="/builder" routerLinkActive="nav-link--active">
        <mat-icon>widgets</mat-icon>
        <span>Builder</span>
      </a>
    </div>

    <!-- Right actions -->
    <div class="nav-actions">
      <!-- Theme toggle -->
      <button class="nav-icon-btn" (click)="toggleTheme.emit()" [title]="isDark ? 'Light mode' : 'Dark mode'">
        @if (isDark) {
          <mat-icon>light_mode</mat-icon>
        } @else {
          <mat-icon>dark_mode</mat-icon>
        }
      </button>

      @if (isAuthed) {
        @if (userEmail) {
          <div class="nav-user">
            <div class="nav-user__avatar">{{ userEmail[0].toUpperCase() }}</div>
            <span class="nav-user__email">{{ userEmail }}</span>
          </div>
        }
        <button class="nav-icon-btn nav-icon-btn--danger" (click)="logout()" title="Sign out">
          <mat-icon>logout</mat-icon>
        </button>
      } @else {
        <a class="nav-signin" routerLink="/login">
          Sign in
          <mat-icon>arrow_forward</mat-icon>
        </a>
      }
    </div>

  </nav>
</header>
